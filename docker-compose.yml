services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: porter
      POSTGRES_PASSWORD: porter
      POSTGRES_DB: porter
    ports:
      - '5432:5432'
    volumes:
      - porter_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U porter']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  porter_data:
